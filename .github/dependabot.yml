# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Enable version updates for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      go-mssqldb:
        patterns:
          - "github.com/microsoft/go-mssqldb"
      azure-sdk:
        patterns:
          - "github.com/Azure/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
      auth:
        patterns:
          - "github.com/AzureAD/*"
          - "github.com/golang-jwt/*"
      testing:
        patterns:
          - "github.com/stretchr/*"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/microsoft/go-mssqldb"
          - "github.com/Azure/*"
          - "golang.org/x/*"
          - "github.com/AzureAD/*"
          - "github.com/golang-jwt/*"
          - "github.com/stretchr/*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Enable version updates for the release Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Enable version updates for the devcontainer Dockerfile
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "devcontainer"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Enable version updates for devcontainer features
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "devcontainer"
    commit-message:
      prefix: "deps"
      include: "scope"
