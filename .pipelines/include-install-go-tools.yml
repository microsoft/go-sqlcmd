steps: 
  - task: GoTool@0
    inputs:
      version: '1.25.7'
  - task: Go@0
    displayName: 'Go: get dependencies'
    inputs:
      command: 'get'
      arguments: '-d'
      workingDirectory: '$(Build.SourcesDirectory)/cmd/sqlcmd'

  - task: Go@0
    displayName: 'Go: install gotest.tools/gotestsum'
    inputs:
      command: 'custom'
      customCommand: 'install'
      arguments: 'gotest.tools/gotestsum@latest'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
  
  - task: Go@0
    displayName: 'Go: install github.com/boumenot/gocover-cobertura'
    inputs:
      command: 'custom'
      customCommand: 'install'
      arguments: 'github.com/boumenot/gocover-cobertura@latest'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
  